<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台北一日遊</title>
    <link rel="stylesheet" type="text/css" href="../static/css/basic.css">
    <link rel="stylesheet" type="text/css" href="../static/css/thankyou.css">
</head>
<body>
    <div class="header_load"></div>
    <div class="popup_load"></div>
    <div class="container">
        <div>
            <h1>上傳圖片或檔案</h1>
            <form id="upload-form" enctype="multipart/form-data">
                <input type="file" name="file" id="file-input">
                <button type="button" onclick="uploadFile()">上傳</button>
            </form>
            <p id="upload-status"></p>

        </div>
        <div>
            會員基本資料
        </div>
        <div>
            歷史訂單紀錄
        </div>
        

    </div>
    <div class="footer_load"></div>

</body>

<script src="../static/js/basic.js"></script>
<script src="../static/js/member.js"></script>

<script>
    function uploadFile() {
            const fileInput = document.getElementById('file-input');
            const file = fileInput.files[0];
            if (!file) {
                alert('請選擇一個檔案');
                return;
            }

            const formData = new FormData();
            formData.append('file', file);

            fetch('/upload', {
                method: 'POST',
                body: formData,
            })
            .then(response => response.json())
            .then(data => {
                document.getElementById('upload-status').innerText = data.message;
            })
            .catch(error => {
                console.error('錯誤：', error);
            });
        }

</script>


</html>
